<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>P2M - OPERAÇÃO LOGÍSTICA LINHA C</title>
    <style>
        :root { --primary: #2d327d; --accent: #ffdb00; --bg: #f4f4f9; --card-border: #e0e0e0; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        header { border-bottom: 2px solid var(--primary); margin-bottom: 20px; padding-bottom: 10px; }
        .logo-area { font-weight: 800; font-size: 26px; color: var(--primary); text-align: center; margin-bottom: 10px; }
        .logo-area span { color: #f5a623; }
        .info-bar { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; color: var(--primary); }

        .grid-operacional { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 15px; }
        .esteira { background: #333; border-radius: 5px; display: flex; align-items: center; justify-content: center; min-height: 550px; }
        .esteira span { transform: rotate(90deg); color: #fff; font-weight: bold; white-space: nowrap; letter-spacing: 5px; opacity: 0.3; }

        .coluna { display: flex; flex-direction: column; gap: 10px; }
        .card { 
            background: #fff; border: 1px solid var(--card-border); 
            border-left: 8px solid #66bc6b; padding: 10px; border-radius: 6px; position: relative;
        }
        /* Estilos de Status */
        .card.fixo { border-left-color: #2d327d; background: #f9f9f9; }
        .card.rotativo { border-left-color: #f5a623; }
        
        .badge-fixo { 
            position: absolute; top: 5px; right: 5px; background: #2d327d; 
            color: #fff; font-size: 8px; padding: 2px 6px; border-radius: 10px; 
        }

        .bancada-id { font-size: 10px; font-weight: bold; color: #888; }
        .nomes { font-size: 15px; font-weight: bold; color: #222; margin: 3px 0; }
        .cat-tag { font-size: 9px; color: #f5a623; font-weight: bold; text-transform: uppercase; }

        .btn-girar { 
            grid-column: span 3; margin-top: 20px; background: #2d327d; color: #fff; 
            border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">🤝 <span>P2M</span> - RODÍZIO ESTRATÉGICO</div>
        <div class="info-bar">
            <div>LINHA C - GESTÃO TÁTICA</div>
            <div id="relogio">--:--:--</div>
        </div>
    </header>

    <div class="grid-operacional">
        <div class="coluna" id="lado-esq"></div>
        <div class="esteira"><span>ESTEIRA CENTRAL</span></div>
        <div class="coluna" id="lado-dir"></div>
        <button class="btn-girar" onclick="girar()">Girar Duplas Rotativas (E1-E4) 🔄</button>
    </div>
</div>

<script>
    // Apenas estas 4 duplas entram no rodízio do lado esquerdo
    const duplasRotativas = [
        "Pietra / Thayanny", 
        "Karina / Thais Lopes", 
        "Pamela / Fernanda", 
        "Leticia / Débora"
    ];

    let offset = parseInt(localStorage.getItem('p2m_rot_offset')) || 0;

    function renderizar() {
        const esq = document.getElementById('lado-esq');
        const dir = document.getElementById('lado-dir');
        esq.innerHTML = ""; dir.innerHTML = "";

        // LADO ESQUERDO (E1 a E5)
        const rotativasNoMomento = [...duplasRotativas];
        for(let i=0; i<offset; i++) rotativasNoMomento.push(rotativasNoMomento.shift());

        // E1 a E4 - Rotativo
        for(let i=1; i<=4; i++) {
            esq.innerHTML += `
                <div class="card rotativo">
                    <div class="bancada-id">BANCADA E${i} - GM</div>
                    <div class="nomes">${rotativasNoMomento[i-1]}</div>
                </div>`;
        }
        // E5 - Fixo Gustavo
        esq.innerHTML += `
            <div class="card fixo">
                <span class="badge-fixo">FIXO</span>
                <div class="bancada-id">BANCADA E5 - GM</div>
                <div class="nomes">GUSTAVO</div>
            </div>`;

        // LADO DIREITO (D1 a D7)
        const layoutDir = [
            { id: "D1", nome: "LAURA", status: "FIXO", label: "PESCA", tipo: "fixo" },
            { id: "D2", nome: "TATY / ALANA", status: "FIXO", label: "CAT - ALIMENTO / SAÚDE", tipo: "fixo" },
            { id: "D3", nome: "TATY / ALANA", status: "FIXO", label: "CAT - COSMÉTICO / MAPA", tipo: "fixo" },
            { id: "D4", nome: "TATY / ALANA", status: "FIXO", label: "CAT - HV / SANEANTES", tipo: "fixo" },
            { id: "D5", nome: "ISAAC ARAÚJO", status: "FIXO", label: "GM", tipo: "fixo" },
            { id: "D6", nome: "JEFFERSON", status: "FIXO", label: "GM", tipo: "fixo" },
            { id: "D7", nome: "ISAC DAMASCENO", status: "FIXO", label: "GM", tipo: "fixo" }
        ];

        layoutDir.forEach(b => {
            dir.innerHTML += `
                <div class="card ${b.tipo}">
                    <span class="badge-fixo">${b.status}</span>
                    <div class="bancada-id">BANCADA ${b.id} - ${b.label}</div>
                    <div class="nomes">${b.nome}</div>
                </div>`;
        });
    }

    function girar() {
        offset = (offset + 1) % duplasRotativas.length;
        localStorage.setItem('p2m_rot_offset', offset);
        renderizar();
    }

    setInterval(() => { document.getElementById('relogio').innerText = new Date().toLocaleTimeString(); }, 1000);
    window.onload = renderizar;
</script>
</body>
</html>
