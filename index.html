<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BACKOFFICE - GESTÃO TÁTICA P2M</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0a0a0a; 
            color: #ccc; 
            padding: 20px; 
            margin: 0;
        }
        .container { max-width: 1100px; margin: auto; }
        
        h1 { 
            color: #d4a017; 
            border-bottom: 2px solid #333; 
            padding-bottom: 10px; 
            text-transform: uppercase;
            font-weight: 600;
            font-size: 22px;
            letter-spacing: 1px;
        }

        .layout-bancadas { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 25px; 
            margin-top: 20px;
        }
        
        .coluna { display: flex; flex-direction: column; gap: 15px; }

        .card-bancada { 
            background: #111; 
            padding: 15px; 
            border-radius: 6px; 
            border: 1px solid #222;
            border-left: 5px solid #444;
            position: relative;
        }

        /* Estilo para Bancadas Fixas */
        .fixo { border-left-color: #d4a017; background: #161616; }
        /* Estilo para Bancadas Rotativas */
        .rotativo { border-left-color: #555; }

        .tag-fixo { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            font-size: 9px; 
            color: #d4a017; 
            border: 1px solid #d4a017; 
            padding: 2px 6px; 
            border-radius: 4px;
            text-transform: uppercase;
        }

        .bancada-id { font-size: 11px; color: #666; text-transform: uppercase; margin-bottom: 5px; }
        .nomes { font-size: 18px; font-weight: bold; color: #eee; }
        .categoria { font-size: 10px; color: #888; margin-top: 5px; display: block; }

        .btn-girar { 
            background: #d4a017; 
            color: #000; 
            border: none; 
            padding: 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%; 
            margin-top: 30px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>PAINEL DE ROTATIVIDADE // LINHA C</h1>

    <div class="layout-bancadas">
        <div class="coluna" id="lado-esq">
            </div>

        <div class="coluna" id="lado-dir">
            </div>
    </div>

    <button class="btn-girar" onclick="girar()">🔄 Girar Rodízio (E1 - E4)</button>
</div>

<script>
    // As 4 duplas que rodam no lado esquerdo
    const duplasRotativas = [
        "Pietra / Thayanny", 
        "Karina / Thais Lopes", 
        "Pamela / Fernanda", 
        "Leticia / Débora"
    ];

    let offset = parseInt(localStorage.getItem('p2m_offset_rodizio')) || 0;

    function renderizar() {
        const esq = document.getElementById('lado-esq');
        const dir = document.getElementById('lado-dir');
        esq.innerHTML = ""; dir.innerHTML = "";

        // --- LADO ESQUERDO ---
        const rotativas = [...duplasRotativas];
        for(let i=0; i<offset; i++) rotativas.push(rotativas.shift());

        // E1 ao E4 (Rotativo)
        for(let i=0; i<4; i++) {
            esq.innerHTML += `
                <div class="card-bancada rotativo">
                    <div class="bancada-id">Bancada E${i+1}</div>
                    <div class="nomes">${rotativas[i]}</div>
                    <span class="categoria">GM - ROTATIVO</span>
                </div>`;
        }

        // E5 (Fixo - Gustavo)
        esq.innerHTML += `
            <div class="card-bancada fixo">
                <span class="tag-fixo">Fixo</span>
                <div class="bancada-id">Bancada E5</div>
                <div class="nomes">GUSTAVO</div>
                <span class="categoria">GM</span>
            </div>`;

        // --- LADO DIREITO (Tudo Fixo) ---
        const bancadasDir = [
            { id: "D1", nome: "LAURA", cat: "PESCA" },
            { id: "D2", nome: "TATY / ALANA", cat: "CAT - ALIMENTO / SAÚDE" },
            { id: "D3", nome: "TATY / ALANA", cat: "CAT - COSMÉTICO / MAPA" },
            { id: "D4", nome: "TATY / ALANA", cat: "CAT - HV / SANEANTES" },
            { id: "D5", nome: "ISAAC ARAÚJO", cat: "GM" },
            { id: "D6", nome: "JEFFERSON", cat: "GM" },
            { id: "D7", nome: "ISAC DAMASCENO", cat: "GM" }
        ];

        bancadasDir.forEach(b => {
            dir.innerHTML += `
                <div class="card-bancada fixo">
                    <span class="tag-fixo">Fixo</span>
                    <div class="bancada-id">Bancada ${b.id}</div>
                    <div class="nomes">${b.nome}</div>
                    <span class="categoria">${b.cat}</span>
                </div>`;
        });
    }

    function girar() {
        offset = (offset + 1) % duplasRotativas.length;
        localStorage.setItem('p2m_offset_rodizio', offset);
        renderizar();
    }

    window.onload = renderizar;
</script>
</body>
</html>
